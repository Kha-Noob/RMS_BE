# Test Profile Configuration - H2 In-Memory Database
spring.config.activate.on-profile=test

# H2 Database
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (disabled for tests)
spring.h2.console.enabled=false

# Disable Redis for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Disable mail for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=

# Disable Spring Security OAuth2 for tests (no real Google config needed)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Disable WebSocket startup issues
spring.main.allow-bean-definition-overriding=true

# CORS
app.cors.allowed-origins=http://localhost:3000

# Gemini API (dummy for tests)
openai.api.key=test-key
